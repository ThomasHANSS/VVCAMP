name: Phenology Enrichment Batch

on:
  workflow_dispatch:

jobs:
  enrich:
    runs-on: ubuntu-latest
    timeout-minutes: 350
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Run phenology enrichment
        run: |
          python3 -u data/scripts/enrich_phenology.py

      - name: Show summary
        if: always()
        run: |
          if [ -f data/gbif_phenology_cache.json ]; then
            python3 -c "
          import json
          c = json.load(open('data/gbif_phenology_cache.json'))
          matched = sum(1 for v in c.values() if v.get('k'))
          pheno = sum(1 for v in c.values() if v.get('p'))
          print(f'Total cache  : {len(c)}')
          print(f'Match GBIF   : {matched} ({matched*100//max(len(c),1)}%)')
          print(f'Avec pheno   : {pheno} ({pheno*100//max(len(c),1)}%)')
            "
          fi
          if [ -f data/phenology_batch.log ]; then
            echo '--- Dernieres lignes du log ---'
            tail -30 data/phenology_batch.log
          fi

      - name: Commit results
        if: always()
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/gbif_phenology_cache.json data/phenology_batch.log 2>/dev/null || true
          if git diff --staged --quiet; then
            echo "Aucun changement a committer"
          else
            git commit -m "data: GBIF phenology batch update"
            git push
          fi
